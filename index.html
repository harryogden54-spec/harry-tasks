// ─── Deadline Banner ──────────────────────────────────────────────────────────
function DeadlineBanner({deadlines,T}){
  const urgent=deadlines.filter(d=>{
    const diff=Math.round((new Date(d.date+"T12:00:00")-new Date(TODAY+"T12:00:00"))/86400000);
    return diff>=0&&diff<=3;
  }).sort((a,b)=>a.date>b.date?1:-1);
  if(!urgent.length)return null;
  const d=urgent[0];
  const course=COURSES.find(c=>c.id===d.course);
  const diff=Math.round((new Date(d.date+"T12:00:00")-new Date(TODAY+"T12:00:00"))/86400000);
  const label=diff===0?"Due TODAY":diff===1?"Due TOMORROW":`Due in ${diff} days`;
  return(
    <div className="pulse" style={{background:`linear-gradient(135deg,${PRIORITY_COLOR.High}22,${PRIORITY_COLOR.High}10)`,border:`1.5px solid ${PRIORITY_COLOR.High}60`,borderRadius:14,padding:"14px 20px",marginBottom:18,display:"flex",alignItems:"center",gap:14}}>
      <div style={{color:PRIORITY_COLOR.High,flexShrink:0,display:"flex"}}><Ic n="alert"/></div>
      <div style={{flex:1}}>
        <p style={{fontSize:13,fontWeight:800,color:PRIORITY_COLOR.High,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{label}</p>
        <p style={{fontSize:15,fontWeight:600,color:T.text,margin:0}}>{d.title}</p>
        {course&&<p style={{fontSize:12,color:T.muted,marginTop:2}}>{course.name}</p>}
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <p style={{fontSize:20,fontWeight:800,color:PRIORITY_COLOR.High,lineHeight:1}}>{diff===0?"0":diff}</p>
        <p style={{fontSize:10,color:T.muted,fontWeight:600}}>{diff===0?"days":"days left"}</p>
      </div>
    </div>
  );
}

// ─── Habits Panel ─────────────────────────────────────────────────────────────
function HabitsPanel({habits,setHabits,T}){
  const todayKey=`habits-done-${TODAY}`;
  const[done,setDone]=useState(()=>lsGet(todayKey,[]));
  const[adding,setAdding]=useState(false);
  const[newTitle,setNewTitle]=useState("");
  const[newEmoji,setNewEmoji]=useState("✅");

  // Auto-reset check: if stored key is old, clear it
  useEffect(()=>{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith("habits-done-")&&k!==todayKey);
    keys.forEach(k=>localStorage.removeItem(k));
  },[]);

  useEffect(()=>{lsSet(todayKey,done);},[done]);

  const toggle=id=>setDone(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const addHabit=()=>{if(!newTitle.trim())return;setHabits(p=>[...p,{id:`h${Date.now()}`,title:newTitle.trim(),emoji:newEmoji,time:"anytime"}]);setNewTitle("");setAdding(false);};
  const delHabit=id=>setHabits(p=>p.filter(h=>h.id!==id));
  const doneCount=habits.filter(h=>done.includes(h.id)).length;

  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:20,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:T.accent,display:"flex",alignItems:"center"}}><Ic n="repeat"/></span>
          <span style={{fontSize:14,fontWeight:700,color:T.text,letterSpacing:"-0.01em"}}>Daily Habits</span>
          <span style={{fontSize:11,color:doneCount===habits.length&&habits.length>0?"#A3BE8C":T.muted,fontWeight:600,background:T.alt,padding:"2px 8px",borderRadius:6}}>{doneCount}/{habits.length}</span>
        </div>
        <button onClick={()=>setAdding(a=>!a)} style={{background:T.alt,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,color:T.muted,fontWeight:600}}>+ Add</button>
      </div>
      {habits.length>0&&<div style={{height:4,background:T.border,borderRadius:4,marginBottom:14}}><div style={{height:"100%",width:`${habits.length?Math.round((doneCount/habits.length)*100):0}%`,background:"#A3BE8C",borderRadius:4,transition:"width 0.4s"}}/></div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {habits.map(h=>{
          const isDone=done.includes(h.id);
          return(
            <div key={h.id} onClick={()=>toggle(h.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:12,border:`1.5px solid ${isDone?"#A3BE8C":T.border}`,background:isDone?"#A3BE8C18":T.alt,cursor:"pointer",transition:"all 0.2s",opacity:isDone?0.75:1}}>
              <span style={{fontSize:18}}>{h.emoji}</span>
              <span style={{fontSize:13,fontWeight:600,color:isDone?T.muted:T.text,textDecoration:isDone?"line-through":"none"}}>{h.title}</span>
              {isDone&&<span style={{fontSize:12,color:"#A3BE8C",fontWeight:700}}>✓</span>}
              <button onClick={e=>{e.stopPropagation();delHabit(h.id);}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14,marginLeft:2,lineHeight:1,padding:0}}>×</button>
            </div>
          );
        })}
      </div>
      {adding&&<div style={{marginTop:12,display:"flex",gap:8,alignItems:"center"}}>
        <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} placeholder="Emoji" style={{width:52,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px",fontSize:18,textAlign:"center",background:T.alt,color:T.text,outline:"none"}}/>
        <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="Habit name…" autoFocus style={{flex:1,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:T.text,background:T.alt,outline:"none"}}/>
        <button onClick={addHabit} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>Add</button>
      </div>}
    </div>
  );
}

// ─── Next Class Card ──────────────────────────────────────────────────────────
function NextClassCard({T}) {
  const now = new Date();
  const todayDow = (now.getDay() + 6) % 7; // 0=Mon
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const todaySlots = TIMETABLE.filter(s => s.day === todayDow).sort((a,b) => a.start - b.start);
  const upcoming = todaySlots.find(s => s.start * 60 > nowMins);
  const current  = todaySlots.find(s => s.start * 60 <= nowMins && s.end * 60 > nowMins);
  const slot = current || upcoming;
  if (!slot) {
    const nextDaySlots = [];
    for (let d = 1; d <= 4; d++) {
      const dayIdx = (todayDow + d) % 7;
      if (dayIdx >= 5) continue;
      const slots = TIMETABLE.filter(s => s.day === dayIdx).sort((a,b) => a.start - b.start);
      if (slots.length) { nextDaySlots.push({...slots[0], dayIdx}); break; }
    }
    if (!nextDaySlots.length) return null;
    const ns = nextDaySlots[0];
    const c = COURSES.find(x => x.id === ns.course);
    return (
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`4px solid ${c?.color||T.accent}`,borderRadius:16,padding:18,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
          <span style={{display:"flex",color:T.muted}}><Ic n="calendar"/></span>
          <span style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Next — {DAY_NAMES[ns.dayIdx]}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <p style={{fontSize:15,fontWeight:700,color:T.text,margin:"0 0 4px"}}>{c?.name}</p>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,fontWeight:600,color:TYPE_COLOR[ns.type]||T.accent,background:(TYPE_COLOR[ns.type]||T.accent)+"20",padding:"2px 8px",borderRadius:5}}>{ns.type}</span>
              <span style={{display:"flex",alignItems:"center",gap:3,fontSize:12,color:T.muted}}><span style={{display:"flex"}}><Ic n="clock"/></span>{fmt12(ns.start)}</span>
            </div>
          </div>
        </div>
      </div>
    );
  }
  const c = COURSES.find(x => x.id === slot.course);
  const isCurrent = !!current;
  const minsUntil = slot.start * 60 - nowMins;
  const minsLeft = slot.end * 60 - nowMins;
  return (
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`4px solid ${c?.color||T.accent}`,borderRadius:16,padding:18,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
        <span style={{display:"flex",color:isCurrent?"#A3BE8C":T.muted}}><Ic n="clock"/></span>
        <span style={{fontSize:10,fontWeight:700,color:isCurrent?"#A3BE8C":T.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>{isCurrent?"In Progress":"Up Next"}</span>
        {isCurrent&&<span style={{width:6,height:6,borderRadius:"50%",background:"#A3BE8C",display:"inline-block",marginLeft:2,animation:"pulse 2s ease-in-out infinite"}}/>}
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:15,fontWeight:700,color:T.text,margin:"0 0 5px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c?.name}</p>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:600,color:TYPE_COLOR[slot.type]||T.accent,background:(TYPE_COLOR[slot.type]||T.accent)+"20",padding:"2px 8px",borderRadius:5}}>{slot.type}</span>
            <span style={{display:"flex",alignItems:"center",gap:3,fontSize:12,color:T.muted}}><span style={{display:"flex"}}><Ic n="clock"/></span>{fmt12(slot.start)}–{fmt12(slot.end)}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:3,marginTop:5,fontSize:12,color:T.muted}}>
            <span style={{display:"flex"}}><Ic n="location"/></span>
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slot.room}</span>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:22,fontWeight:800,color:c?.color||T.accent,lineHeight:1,letterSpacing:"-0.02em"}}>{isCurrent?minsLeft:minsUntil}</div>
          <div style={{fontSize:10,color:T.muted,fontWeight:600}}>{isCurrent?"min left":"min away"}</div>
        </div>
      </div>
    </div>
  );
}

// ─── SyncDot ──────────────────────────────────────────────────────────────────
function SyncDot({status}){

// ─── Calendar ────────────────────────────────────────────────────────────────
function Cal({tasks,T}){
  const now=new Date();const[mo,setMo]=useState(now.getMonth());const[yr,setYr]=useState(now.getFullYear());
  const dim=new Date(yr,mo+1,0).getDate(),fd=(new Date(yr,mo,1).getDay()+6)%7;const byDay={};
  tasks.forEach(t=>{if(!t.dueDate||t.status==="Done")return;const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()===mo&&d.getFullYear()===yr){const k=d.getDate();byDay[k]=[...(byDay[k]||[]),t];}});
  const mn=new Date(yr,mo,1).toLocaleString("en-GB",{month:"long",year:"numeric"});const td=new Date().getDate(),tm=new Date().getMonth(),ty=new Date().getFullYear();
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,padding:"2px 6px",lineHeight:1}}>‹</button><span style={{fontSize:13,fontWeight:700,color:T.text}}>{mn}</span><button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,padding:"2px 6px",lineHeight:1}}>›</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,textAlign:"center"}}>{["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{fontSize:10,color:T.muted,fontWeight:700,padding:"4px 0"}}>{d}</div>)}{Array(fd).fill(null).map((_,i)=><div key={`e${i}`}/>)}{Array(dim).fill(null).map((_,i)=>{const day=i+1,has=byDay[day],isToday=day===td&&mo===tm&&yr===ty;const over=has?.some(t=>new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00"));return<div key={day} style={{padding:"5px 2px",borderRadius:7,fontSize:12,background:isToday?T.accent:"transparent",color:isToday?T.fg:has?(over?PRIORITY_COLOR.High:T.accent):T.muted,fontWeight:isToday||has?700:400}}>{day}{has&&!isToday&&<div style={{width:4,height:4,borderRadius:"50%",background:over?PRIORITY_COLOR.High:T.accent,margin:"2px auto 0"}}/>}</div>;})}</div></div>);
}

          <button onClick={()=>{if(ns.trim()){u("subtasks",[...f.subtasks,{id:Date.now(),title:ns.trim(),done:false}]);setNs("");}}} style={{background:T.accent,color:"#fff",border:"none",borderRadius:10,padding:"0 18px",cursor:"pointer",fontSize:14,fontWeight:600}}>Add</button>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>onSave(f)} style={{flex:1,background:T.accent,color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700}}>Save</button>
          <button onClick={onClose} style={{flex:1,background:T.alt,color:T.muted,border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ─── Course Week Grid ─────────────────────────────────────────────────────────
function CourseWeekGrid({course,weeks,currentWeek,get,tog,T,examDate,onExamChange}){
  const total=course.fields.length*weeks;
  const done=Array.from({length:weeks},(_,i)=>i+1).reduce((a,w)=>a+course.fields.filter(f=>get(course.id,w,f)).length,0);
  const pct=Math.round((done/total)*100);const[open,setOpen]=useState(false);const examFmt=examDate?dateFmt(examDate):null;
  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,marginBottom:14,overflow:"hidden"}} className="slide-in">
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",cursor:"pointer",borderBottom:open?`1px solid ${T.border}`:"none",background:T.alt}}>
        <div style={{width:12,height:12,borderRadius:3,background:course.color,flexShrink:0}}/>
        <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{course.name}</span>
        {examDate&&<div style={{display:"flex",alignItems:"center",gap:4,marginRight:10}}>
          <span style={{display:"flex",color:T.muted,opacity:0.7}}><Ic n="exam"/></span>
          <span style={{fontSize:11,color:examFmt?.over?PRIORITY_COLOR.High:T.muted,fontWeight:600}}>Exam: {examFmt?.label||examDate}</span>
        </div>}
        <span style={{fontSize:12,color:pct===100?"#A3BE8C":T.muted,fontWeight:600,marginRight:10}}>{done}/{total} · {pct}%</span>
        <div style={{width:64,height:4,background:T.border,borderRadius:2,marginRight:10}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#A3BE8C":course.color,borderRadius:2,transition:"width 0.4s"}}/></div>
        <span style={{fontSize:12,color:T.muted,transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(0)":"rotate(-90deg)"}}>▼</span>
      </div>
      {open&&<div style={{padding:"0 20px 18px"}}>{!course.noExam&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 0",borderBottom:`1px solid ${T.border}`,marginBottom:4}}>
          <span style={{display:"flex",color:T.muted}}><Ic n="exam"/></span>
          <span style={{fontSize:12,fontWeight:700,color:T.muted,flex:1}}>Exam Date</span>
          <input type="date" value={examDate||""} onChange={e=>onExamChange(course.id,e.target.value)} style={{border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,color:T.text,background:T.alt,outline:"none"}}/>
          {examDate&&<span style={{fontSize:11,fontWeight:600,color:examFmt?.over?PRIORITY_COLOR.High:PRIORITY_COLOR.Medium}}>{examFmt?.label}</span>}
        </div>}<div style={{overflowX:"auto",marginTop:12}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
          <thead><tr><th style={{textAlign:"left",fontSize:10,fontWeight:700,color:T.muted,paddingBottom:12,textTransform:"uppercase",width:54}}>Week</th>{course.fields.map(f=><th key={f} style={{fontSize:10,fontWeight:700,color:T.muted,paddingBottom:12,textAlign:"center",textTransform:"uppercase"}}>{FIELD_LABELS[f]}</th>)}<th style={{fontSize:10,fontWeight:700,color:T.muted,paddingBottom:12,textAlign:"center",textTransform:"uppercase"}}>Done</th></tr></thead>
          <tbody>{Array.from({length:weeks},(_,i)=>i+1).map(wk=>{const wkDone=course.fields.filter(f=>get(course.id,wk,f)).length;const allDone=wkDone===course.fields.length,isCurrent=wk===currentWeek;return<tr key={wk} style={{borderTop:`1px solid ${T.border}`,background:isCurrent?T.accent+"15":"transparent"}}><td style={{padding:"11px 0",fontSize:12,fontWeight:isCurrent?700:400,color:isCurrent?T.accent:T.text}}>Wk {wk}{isCurrent&&<span style={{fontSize:9,fontWeight:700,color:T.accent,marginLeft:5,background:T.accent+"25",padding:"1px 6px",borderRadius:4}}>now</span>}</td>{course.fields.map(f=><td key={f} style={{textAlign:"center",padding:"11px 8px"}}><div style={{display:"flex",justifyContent:"center"}}><Check checked={get(course.id,wk,f)} onChange={()=>tog(course.id,wk,f)} color={course.color} T={T}/></div></td>)}<td style={{textAlign:"center",padding:"11px 8px"}}><span style={{fontSize:11,fontWeight:600,color:allDone?"#A3BE8C":T.muted}}>{allDone?"✓":""}{wkDone}/{course.fields.length}</span></td></tr>;})}
          </tbody>
        </table>
      </div></div>}
    </div>
  );
}

// ─── List Panel ───────────────────────────────────────────────────────────────
function ListPanel({list,onUpdate,onDelete,T,compact}){
  const[newText,setNewText]=useState("");
  const[editingName,setEditingName]=useState(false);
  const[nameVal,setNameVal]=useState(list.name);
  const[open,setOpen]=useState(true);
  const[editColor,setEditColor]=useState(false);
  const dragOver=useRef(null),dragItem=useRef(null);
  const type=list.type||"checklist";
  const items=[...(list.items||[])].sort((a,b)=>a.order-b.order);
  const doneCount=items.filter(i=>i.done).length;
  const upd=nl=>onUpdate(nl);
  const updItems=ni=>upd({...list,items:ni});
  const addItem=()=>{if(!newText.trim())return;const max=items.length?Math.max(...items.map(i=>i.order))+1:0;updItems([...list.items,{id:`li${Date.now()}`,text:newText.trim(),url:type==="links"?newText.trim():"",note:"",done:false,order:max}]);setNewText("");};
  const toggleItem=id=>updItems(list.items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const deleteItem=id=>updItems(list.items.filter(i=>i.id!==id));
  const updateItemText=(id,text)=>updItems(list.items.map(i=>i.id===id?{...i,text}:i));
  const saveName=()=>{if(nameVal.trim())upd({...list,name:nameVal.trim()});setEditingName(false);};
  const typeInfo=LIST_TYPES.find(t=>t.id===type)||LIST_TYPES[0];
  const dh=idx=>({
    onDragStart:e=>{dragItem.current=idx;e.dataTransfer.effectAllowed="move";},
    onDragOver:e=>{e.preventDefault();dragOver.current=idx;},
    onDrop:e=>{e.preventDefault();if(dragItem.current===null||dragItem.current===dragOver.current)return;const s=[...list.items].sort((a,b)=>a.order-b.order);const m=s.splice(dragItem.current,1)[0];s.splice(dragOver.current,0,m);updItems(s.map((it,i)=>({...it,order:i})));dragItem.current=null;dragOver.current=null;},
    onDragEnd:()=>{dragItem.current=null;dragOver.current=null;}
  });
  const inp_s={flex:1,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"11px 14px",fontSize:14,color:T.text,background:T.alt,outline:"none"};

  if(compact){
    return(
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`4px solid ${list.color}`,borderRadius:16,padding:18}} className="card-enter">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{display:"flex",alignItems:"center",color:T.muted}}>{LIST_TYPE_ICONS[type]||"checklist"}</span>
          <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{list.name}</span>
          {type==="checklist"&&<span style={{fontSize:12,color:T.muted}}>{doneCount}/{items.length}</span>}
        </div>
        {type==="notes"&&<p style={{fontSize:13,color:T.muted,lineHeight:1.5,maxHeight:80,overflow:"hidden"}}>{list.content||"No notes yet."}</p>}
        {type!=="notes"&&items.length===0&&<p style={{fontSize:13,color:T.muted}}>No items yet.</p>}
        {type!=="notes"&&items.slice(0,4).map(item=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:`1px solid ${T.border}`}}>
            {type==="checklist"&&<Check checked={item.done} onChange={()=>toggleItem(item.id)} color={list.color} T={T}/>}
            {type==="simple"&&<div style={{width:5,height:5,borderRadius:"50%",background:list.color,flexShrink:0,marginLeft:2}}/>}
            {type==="links"&&<span style={{display:"flex",alignItems:"center",color:T.accent,flexShrink:0}}><Ic n="link"/></span>}
            {type==="links"
              ?<a href={item.url||item.text} target="_blank" rel="noreferrer" style={{flex:1,fontSize:13,color:T.accent,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text||item.url}</a>
              :<span style={{flex:1,fontSize:13,color:item.done?T.muted:T.text,textDecoration:item.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</span>
            }
          </div>
        ))}
        {items.length>4&&<p style={{fontSize:12,color:T.muted,marginTop:8}}>+{items.length-4} more</p>}
        {type==="checklist"&&items.length>0&&<div style={{marginTop:12,height:3,background:T.border,borderRadius:2}}><div style={{height:"100%",width:`${Math.round((doneCount/items.length)*100)}%`,background:list.color,borderRadius:2,transition:"width 0.3s"}}/></div>}
      </div>
    );
  }

  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,marginBottom:16,overflow:"hidden"}} className="slide-in">
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:open?`1px solid ${T.border}`:"none",background:T.alt}}>
        <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setEditColor(v=>!v)}>
          <div style={{width:12,height:12,borderRadius:3,background:list.color}}/>
          {editColor&&<div style={{position:"absolute",top:18,left:0,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:10,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,zIndex:50,width:140}} onClick={e=>e.stopPropagation()}>
            {LIST_COLORS.map(c=><div key={c} onClick={()=>{upd({...list,color:c});setEditColor(false);}} style={{width:18,height:18,borderRadius:4,background:c,cursor:"pointer",border:c===list.color?`2.5px solid ${T.text}`:"2px solid transparent"}}/>)}
          </div>}
        </div>
        <span style={{display:"flex",alignItems:"center",color:T.muted}}>{LIST_TYPE_ICONS[type]||"checklist"}</span>
        {editingName
          ?<input autoFocus value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape"){setNameVal(list.name);setEditingName(false);}}} style={{flex:1,border:`1.5px solid ${T.border}`,borderRadius:8,padding:"5px 10px",fontSize:14,fontWeight:700,color:T.text,background:T.surface,outline:"none"}}/>
          :<span onClick={()=>setEditingName(true)} style={{fontSize:14,fontWeight:700,color:T.text,flex:1,cursor:"text"}}>{list.name}</span>
        }
        <span style={{fontSize:10,color:T.muted,background:T.border,padding:"3px 8px",borderRadius:6,fontWeight:600,flexShrink:0}}>{typeInfo.label}</span>
        {type==="checklist"&&items.length>0&&<><span style={{fontSize:12,color:doneCount===items.length?"#A3BE8C":T.muted,fontWeight:600}}>{doneCount}/{items.length}</span><div style={{width:50,height:3,background:T.border,borderRadius:2,marginLeft:4,marginRight:8}}><div style={{height:"100%",width:`${Math.round((doneCount/items.length)*100)}%`,background:list.color,borderRadius:2,transition:"width 0.3s"}}/></div></>}
        <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13,padding:"2px 4px"}}>{open?"▲":"▼"}</button>
        <button onClick={()=>onDelete(list.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:20,padding:0,lineHeight:1}}>×</button>
      </div>
      {open&&<div style={{padding:"16px 20px 0"}}>
        {type==="notes"&&<textarea value={list.content||""} onChange={e=>upd({...list,content:e.target.value})} placeholder="Start writing your notes here…" style={{width:"100%",minHeight:200,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"14px 16px",fontSize:14,color:T.text,background:T.alt,outline:"none",resize:"vertical",lineHeight:1.6}}/>}
        {type!=="notes"&&<>
          {items.length===0&&<p style={{fontSize:14,color:T.muted,marginBottom:14}}>No items yet — add one below.</p>}
          {items.map((item,idx)=>(
            <div key={item.id} draggable onDragStart={dh(idx).onDragStart} onDragOver={dh(idx).onDragOver} onDrop={dh(idx).onDrop} onDragEnd={dh(idx).onDragEnd}
              style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,opacity:item.done?0.6:1,transition:"opacity 0.15s"}}>
              {type!=="links"&&<span style={{color:T.border,cursor:"grab",flexShrink:0,display:"flex",alignItems:"center"}}><Ic n="drag"/></span>}
              {type==="checklist"&&<Check checked={item.done} onChange={()=>toggleItem(item.id)} color={list.color} T={T}/>}
              {type==="simple"&&<div style={{width:7,height:7,borderRadius:"50%",background:list.color,flexShrink:0}}/>}
              {type==="links"&&<span style={{display:"flex",alignItems:"center",color:T.accent,flexShrink:0,fontSize:0}}>{React.cloneElement("checklist",{width:17,height:17})}</span>}
              {type==="links"
                ?<div style={{flex:1,minWidth:0}}>
                    <input value={item.text||""} onChange={e=>updateItemText(item.id,e.target.value)} placeholder="Label" style={{width:"100%",border:"none",outline:"none",background:"transparent",fontSize:13,fontWeight:600,color:T.text,marginBottom:3}}/>
                    <input value={item.url||""} onChange={e=>updItems(list.items.map(i=>i.id===item.id?{...i,url:e.target.value}:i))} placeholder="https://…" style={{width:"100%",border:"none",outline:"none",background:"transparent",fontSize:12,color:T.accent}}/>
                  </div>
                :<input value={item.text||""} onChange={e=>updateItemText(item.id,e.target.value)} style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:14,color:item.done?T.muted:T.text,textDecoration:item.done?"line-through":"none"}}/>
              }
              {type==="links"&&item.url&&<a href={item.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:T.accent,background:T.accent+"20",padding:"4px 10px",borderRadius:6,textDecoration:"none",flexShrink:0,fontWeight:600}}>Open</a>}
              <button onClick={()=>deleteItem(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,padding:0,lineHeight:1,flexShrink:0}}>×</button>
            </div>
          ))}
          </>}
          <div style={{display:"flex",gap:8,padding:"12px 0 16px",position:"sticky",bottom:0,background:T.surface}}>
            <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder={type==="links"?"Paste a URL…":"Add item…"} style={inp_s}/>
            <button onClick={addItem} style={{background:list.color,color:"#fff",border:"none",borderRadius:10,padding:"11px 20px",cursor:"pointer",fontSize:14,fontWeight:700}}>Add</button>
          </div>
      </div>}
    </div>
  );
}

      <HabitsPanel habits={habits} setHabits={setHabits} T={T}/>
      <div style={{...C,borderLeft:`4px solid ${PRIORITY_COLOR.Medium}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Today</span>
          <button onClick={()=>setView("tasks")} style={{background:"none",border:"none",cursor:"pointer",color:T.accent,fontSize:12,fontWeight:700}}>All tasks →</button>
        </div>
        {todayTasks.length===0?<div style={{textAlign:"center",padding:"16px 0"}}><div style={{color:"#A3BE8C",display:"flex",justifyContent:"center",marginBottom:6}}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div><p style={{fontSize:13,color:T.muted}}>Nothing due today</p></div>
          :todayTasks.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/>
              <span style={{flex:1,fontSize:14,color:T.text,fontWeight:500}}>{t.title}</span>
              <span style={{fontSize:11,color:CAT_COLOR[t.category],background:CAT_COLOR[t.category]+"20",padding:"3px 8px",borderRadius:6,fontWeight:600}}>{t.category}</span>
            </div>
          ))
        }
      </div>
      {lists.length>0&&<div style={C}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:13,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>My Lists</span>
          <button onClick={()=>setView("lists")} style={{background:"none",border:"none",cursor:"pointer",color:T.accent,fontSize:12,fontWeight:700}}>View all →</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>{lists.map(list=><ListPanel key={list.id} list={list} onUpdate={updateList} onDelete={deleteList} T={T} compact={true}/>)}</div>
      </div>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[tasks,setTasks]          =useState(()=>lsGet("h-tasks-html",INITIAL_TASKS));
  const[cd,setCd]                =useState(()=>lsGet("h-courses-html",{}));
  const[deadlines,setDeadlines]  =useState(()=>lsGet("h-dl-html",[]));
  const[lists,setLists]          =useState(()=>lsGet("h-lists-html",INITIAL_LISTS));
  const[habits,setHabits]        =useState(()=>lsGet("h-habits-html",INITIAL_HABITS));
  const[archive,setArchive]      =useState(()=>lsGet("h-archive-html",[]));
  const[examDates,setExamDates]  =useState(()=>lsGet("h-exams-html",INITIAL_EXAM_DATES));
  const[view,setView]            =useState("dashboard");
  const[tv,setTv]                =useState("list");
  const[edit,setEdit]            =useState(null);
  const[theme,setTheme]          =useState(()=>lsGet("h-theme-html","polar"));
  const[fCat,setFCat]            =useState("All");
  const[sortBy,setSortBy]        =useState("default");
  const[hideDone,setHideDone]    =useState(false);
  const[search,setSearch]        =useState("");
  const[dragId,setDragId]        =useState(null);
  const[newDl,setNewDl]          =useState({title:"",course:"maths",date:"",notes:""});
  const[showNewList,setShowNewList]=useState(false);
  const[showSearch,setShowSearch]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[syncStatus,setSyncStatus]=useState("idle");
  const[loaded,setLoaded]        =useState(false);
  const[notifEnabled,setNotifEnabled]=useState(()=>lsGet("h-notif",false));
  const syncTimer=useRef(null);
  const isMobile=useIsMobile();
  const T=THEMES[theme];
  window.__setTasks=setTasks;

  useEffect(()=>{
    async function loadAll(){
      setSyncStatus("syncing");
      try{
        const[tR,lR,dR,cR,thV,hR,aR]=await Promise.all([sbGetAll("tasks"),sbGetAll("lists"),sbGetAll("deadlines"),sbGetAll("courses"),sbGetSetting("theme"),sbGetSetting("habits"),sbGetSetting("archive")]);
        if(tR!==null){const ld=tR.map(r=>r.data);if(ld.length>0){setTasks(ld);lsSet("h-tasks-html",ld);}}
        if(lR!==null){const ld=lR.map(r=>r.data);if(ld.length>0){setLists(ld);lsSet("h-lists-html",ld);}}
        if(dR!==null){const ld=dR.map(r=>r.data);setDeadlines(ld);lsSet("h-dl-html",ld);}
        if(cR!==null){const obj={};cR.forEach(r=>{Object.assign(obj,r.data);});if(Object.keys(obj).length>0){setCd(obj);lsSet("h-courses-html",obj);}}
        if(thV){setTheme(thV);lsSet("h-theme-html",thV);}
        if(hR){setHabits(hR);lsSet("h-habits-html",hR);}
        if(aR){setArchive(aR);lsSet("h-archive-html",aR);}
        const exR=await sbGetSetting("examDates");if(exR){setExamDates(exR);lsSet("h-exams-html",exR);}
        setSyncStatus("synced");
      }catch{setSyncStatus("offline");}
      setLoaded(true);
    }
    loadAll();
  },[]);

  const debouncedSync=useCallback((fn)=>{
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{setSyncStatus("syncing");const ok=await fn();setSyncStatus(ok?"synced":"offline");},700);
  },[]);

  useEffect(()=>{if(!loaded)return;lsSet("h-tasks-html",tasks);debouncedSync(async()=>{const r=await Promise.all(tasks.map(t=>sbUpsert("tasks",t.id,t)));return r.every(Boolean);});},[tasks]);
  useEffect(()=>{if(!loaded)return;lsSet("h-lists-html",lists);debouncedSync(async()=>{const r=await Promise.all(lists.map(l=>sbUpsert("lists",l.id,l)));return r.every(Boolean);});},[lists]);
  useEffect(()=>{if(!loaded)return;lsSet("h-dl-html",deadlines);debouncedSync(async()=>{const r=await Promise.all(deadlines.map(d=>sbUpsert("deadlines",d.id,d)));return r.every(Boolean);});},[deadlines]);
  useEffect(()=>{if(!loaded)return;lsSet("h-courses-html",cd);debouncedSync(async()=>await sbUpsert("courses","cd-main",cd));},[cd]);
  useEffect(()=>{if(!loaded)return;lsSet("h-habits-html",habits);debouncedSync(async()=>await sbSetSetting("habits",habits));},[habits]);
  useEffect(()=>{if(!loaded)return;lsSet("h-archive-html",archive);debouncedSync(async()=>await sbSetSetting("archive",archive));},[archive]);
  useEffect(()=>{if(!loaded)return;lsSet("h-exams-html",examDates);debouncedSync(async()=>await sbSetSetting("examDates",examDates));},[examDates]);
  useEffect(()=>{lsSet("h-theme-html",theme);document.body.style.background=T.bg;if(loaded)sbSetSetting("theme",theme);},[theme]);
  useEffect(()=>{lsSet("h-notif",notifEnabled);},[notifEnabled]);
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const archiveTask=id=>{
    const t=tasks.find(x=>x.id===id);
    if(!t)return;
    setArchive(p=>[...p,{...t,archivedAt:new Date().toISOString()}]);
    setTasks(p=>p.filter(x=>x.id!==id));
    sbDelete("tasks",id);
  };
  const restoreTask=id=>{
    const t=archive.find(x=>x.id===id);
    if(!t)return;
    const{archivedAt,...task}=t;
    setTasks(p=>[...p,{...task,status:"To Do"}]);
    setArchive(p=>p.filter(x=>x.id!==id));
  };
  const saveTask=t=>{setTasks(p=>p.find(x=>x.id===t.id)?p.map(x=>x.id===t.id?t:x):[...p,t]);setEdit(null);};
  const delTask=async id=>{setTasks(p=>p.filter(t=>t.id!==id));await sbDelete("tasks",id);};
  const pinTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,pinned:!t.pinned}:t));
  const quickDoneTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,status:t.status==="Done"?"To Do":"Done"}:t));
  const tog=(cid,wk,fld)=>setCd(p=>({...p,[`${cid}-${wk}-${fld}`]:!p[`${cid}-${wk}-${fld}`]}));
  const get=(cid,wk,fld)=>!!cd[`${cid}-${wk}-${fld}`];
  const sortT=arr=>[...arr].sort((a,b)=>(a.pinned===b.pinned)?0:a.pinned?-1:1);
  const updateList=updated=>setLists(p=>p.map(l=>l.id===updated.id?updated:l));
  const deleteList=async id=>{setLists(p=>p.filter(l=>l.id!==id));await sbDelete("lists",id);};
  const createList=l=>{setLists(p=>[...p,l]);setShowNewList(false);};
  const addDeadline=()=>{if(!newDl.title||!newDl.date)return;setDeadlines(p=>[...p,{id:`dl${Date.now()}`,...newDl}]);setNewDl({title:"",course:"maths",date:"",notes:""});};
  const delDeadline=async id=>{setDeadlines(p=>p.filter(x=>x.id!==id));await sbDelete("deadlines",id);};
  const handleDrop=status=>{if(!dragId)return;setTasks(p=>p.map(t=>t.id===dragId?{...t,status}:t));setDragId(null);};

  const baseFiltRaw=tasks.filter(t=>(fCat==="All"||t.category===fCat)&&(!search||t.title.toLowerCase().includes(search.toLowerCase()))&&(!hideDone||t.status!=="Done"));
  const baseFilt=useMemo(()=>{
    const arr=[...baseFiltRaw];
    if(sortBy==="dueDate")arr.sort((a,b)=>{if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate>b.dueDate?1:-1;});
    else if(sortBy==="priority"){const ord={High:0,Medium:1,Low:2};arr.sort((a,b)=>ord[a.priority]-ord[b.priority]);}
    else if(sortBy==="created")arr.sort((a,b)=>b.createdAt>a.createdAt?1:-1);
    return arr;
  },[baseFiltRaw,sortBy]);
  const todayTasks=tasks.filter(t=>t.dueDate===TODAY&&t.status!=="Done");
  const urgentTask=tasks.filter(t=>isUrgent(t)&&t.status!=="Done");
  const overdue=tasks.filter(t=>t.dueDate&&new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00")&&t.status!=="Done");
  const upcomingDl=[...deadlines].sort((a,b)=>a.date>b.date?1:-1).filter(d=>d.date>=TODAY).slice(0,5);
  const wkSum=COURSES.map(c=>{const done=c.fields.filter(f=>get(c.id,CURRENT_WEEK,f)).length;return{...c,done,total:c.fields.length,pct:Math.round((done/c.fields.length)*100)};});
  const totI=wkSum.reduce((a,c)=>a+c.total,0),doneI=wkSum.reduce((a,c)=>a+c.done,0);

  const C={background:T.surface,border:`1px solid ${T.border}`,borderRadius:isMobile?16:14,padding:isMobile?18:22};
  const L={fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.12em",display:"block",marginBottom:10};
  const B=a=>({background:a?T.accent:"transparent",color:a?"#fff":T.muted,border:`1px solid ${a?T.accent:T.border}`,borderRadius:8,padding:"6px 16px",cursor:"pointer",fontSize:12,fontWeight:a?700:400,transition:"all 0.15s"});
  const inp2={border:`1.5px solid ${T.border}`,borderRadius:10,padding:"11px 14px",fontSize:isMobile?14:13,color:T.text,background:T.alt,outline:"none"};

  if(!loaded){return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}><div style={{width:32,height:32,borderRadius:"50%",border:`3px solid ${T.border}`,borderTop:`3px solid ${T.accent}`,animation:"spin 1s linear infinite"}}/><span style={{fontSize:14,color:T.muted,fontWeight:500}}>Loading your data…</span></div>);}

  return(
    <div style={{height:"100vh",background:T.bg,transition:"background 0.35s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{`input:focus,select:focus,textarea:focus{border-color:${T.accent}!important;outline:none}@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {!isMobile&&<DesktopNav view={view} setView={setView} syncStatus={syncStatus} T={T} onSearch={()=>setShowSearch(true)} onSettings={()=>setShowSettings(true)}/>}

      {isMobile&&<div style={{background:T.navGrad,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{padding:"14px 18px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <svg width="20" height="20" viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill={T.accent} stroke={T.accent} strokeWidth="1" strokeLinejoin="round"/></svg>
            <span style={{fontSize:17,fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Harry</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <SyncDot status={syncStatus}/>
            <button onClick={()=>setShowSearch(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:9,padding:"6px 10px",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:9,padding:"6px 10px",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",padding:"10px 14px 0",gap:2,WebkitOverflowScrolling:"touch"}}>
          {[["dashboard","Home"],["tasks","Tasks"],["lists","Lists"],["timetable","Timetable"],["courses","Courses"],["archive","Archive"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{whiteSpace:"nowrap",flexShrink:0,background:"none",border:"none",borderBottom:view===v?`2.5px solid ${T.accent}`:"2.5px solid transparent",color:view===v?T.accent:T.muted,fontWeight:view===v?700:400,fontSize:14,padding:"6px 16px 11px",cursor:"pointer",transition:"color 0.15s"}}>{l}</button>
          ))}
        </div>
      </div>}

      <div style={{flex:1,overflowY:"auto",padding:isMobile?"18px":"28px"}} className="fade-in">
        <div style={{maxWidth:isMobile?"100%":1200,margin:"0 auto"}}>

          {/* DASHBOARD */}
          {view==="dashboard"&&(isMobile
            ?<MobileDashboard lists={lists} todayTasks={todayTasks} habits={habits} setHabits={setHabits} deadlines={deadlines} updateList={updateList} deleteList={deleteList} setView={setView} T={T}/>
            :<div className="fade-in">
              <DeadlineBanner deadlines={deadlines} T={T}/>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
                {[{l:"Active Tasks",v:tasks.filter(t=>t.status!=="Done").length,c:T.text},{l:"Due Today",v:todayTasks.length,c:todayTasks.length?PRIORITY_COLOR.Medium:T.text},{l:"Overdue",v:overdue.length,c:overdue.length?PRIORITY_COLOR.High:T.text},{l:"In Progress",v:tasks.filter(t=>t.status==="In Progress").length,c:T.accent}].map(x=>(
                  <div key={x.l} style={{...C,padding:22}}><span style={L}>{x.l}</span><div style={{fontSize:32,fontWeight:800,color:x.c,lineHeight:1,letterSpacing:"-0.02em"}}>{x.v}</div></div>
                ))}
              </div>
              <div style={{marginBottom:20}}><QuickAdd onAdd={t=>setTasks(p=>[...p,t])} T={T} isMobile={false}/></div>
              <div style={{marginBottom:20}}><HabitsPanel habits={habits} setHabits={setHabits} T={T}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1.7fr",gap:16,marginBottom:20}}>
                <div><NextClassCard T={T}/><div style={C}><span style={L}>Calendar</span><Cal tasks={tasks} T={T}/></div></div>
                <div style={C}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                    <span style={L}>All Tasks</span>
                    <button onClick={()=>setView("tasks")} style={{fontSize:12,color:T.accent,background:"none",border:"none",cursor:"pointer",fontWeight:700}}>View all →</button>
                  </div>
                  {CATEGORIES.map(cat=>{
                    const catTasks=tasks.filter(t=>t.category===cat&&t.status!=="Done");
                    if(!catTasks.length)return null;
                    const urg=catTasks.filter(t=>isUrgent(t));
                    return(
                      <div key={cat} style={{marginBottom:16}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                          <div style={{width:8,height:8,borderRadius:"50%",background:CAT_COLOR[cat]}}/>
                          <span style={{fontSize:13,fontWeight:700,color:T.text,flex:1}}>{cat}</span>
                          {urg.length>0&&<span style={{fontSize:10,fontWeight:700,color:PRIORITY_COLOR.High,background:PRIORITY_COLOR.High+"18",padding:"2px 8px",borderRadius:5}}>{urg.length} urgent</span>}
                          <span style={{fontSize:12,color:T.muted}}>{catTasks.length}</span>
                        </div>
                        {catTasks.slice(0,3).map(t=>{const d=dateFmt(t.dueDate);return(
                          <div key={t.id} onClick={()=>setEdit(t)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:9,marginBottom:4,cursor:"pointer",background:isUrgent(t)?PRIORITY_COLOR.High+"10":T.alt,transition:"background 0.12s"}}
                            onMouseEnter={e=>e.currentTarget.style.background=T.border} onMouseLeave={e=>e.currentTarget.style.background=isUrgent(t)?PRIORITY_COLOR.High+"10":T.alt}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/>
                            <span style={{flex:1,fontSize:13,color:T.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                            {d&&<span style={{fontSize:11,color:d.over?PRIORITY_COLOR.High:T.muted,fontWeight:d.over?700:400,flexShrink:0}}>{d.label}</span>}
                          </div>
                        );})}
                        {catTasks.length>3&&<p style={{fontSize:12,color:T.muted,padding:"2px 12px"}}>+{catTasks.length-3} more</p>}
                      </div>
                    );
                  })}
                  {tasks.filter(t=>t.status!=="Done").length===0&&<div style={{textAlign:"center",padding:"24px 0"}}><div style={{color:"#A3BE8C",display:"flex",justifyContent:"center",marginBottom:8}}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><p style={{fontSize:14,color:T.muted}}>All tasks complete!</p></div>}
                </div>
              </div>
              {urgentTask.length>0&&<div style={{...C,marginBottom:20,borderLeft:`4px solid ${PRIORITY_COLOR.High}`}}><span style={{...L,color:PRIORITY_COLOR.High}}>Urgent — Action Needed ({urgentTask.length})</span><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>{urgentTask.slice(0,6).map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} onArchive={archiveTask} onQuickDone={quickDoneTask} T={T}/>)}</div></div>}

              {upcomingDl.length>0&&<div style={C}><span style={L}>Upcoming Deadlines</span>{upcomingDl.map(d=>{const course=COURSES.find(c=>c.id===d.course),df=dateFmt(d.date);return<div key={d.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:`1px solid ${T.border}`}}><div style={{width:8,height:8,borderRadius:"50%",background:course?.color||T.muted,flexShrink:0}}/><span style={{flex:1,fontSize:14,fontWeight:500,color:T.text}}>{d.title}</span><span style={{fontSize:11,color:course?.color,background:course?.color+"20",padding:"3px 9px",borderRadius:6,fontWeight:600}}>{course?.short}</span><span style={{fontSize:12,color:df?.over?PRIORITY_COLOR.High:PRIORITY_COLOR.Medium,fontWeight:600}}>{df?.label||d.date}</span><button onClick={()=>delDeadline(d.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>×</button></div>;})}              </div>}
            </div>
          )}

          {/* TASKS */}
          {view==="tasks"&&<div className="fade-in">
            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={()=>setEdit(newTask())} style={{background:T.accent,color:"#fff",border:"none",borderRadius:10,padding:"11px 22px",cursor:"pointer",fontSize:14,fontWeight:700}}>+ New Task</button>
              <div style={{display:"flex",alignItems:"center",gap:8,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",flex:1,maxWidth:isMobile?"100%":280}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks…" style={{border:"none",outline:"none",background:"transparent",fontSize:14,color:T.text,width:"100%"}}/>
              </div>
              {!isMobile&&<div style={{display:"flex",gap:4}}>{["All",...CATEGORIES].map(c=><button key={c} onClick={()=>setFCat(c)} style={{...B(fCat===c),padding:"6px 13px",fontSize:12}}>{c}</button>)}</div>}
              {!isMobile&&<div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{display:"flex",color:T.muted}}><Ic n="sort"/></span>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,color:T.text,background:T.surface,outline:"none",cursor:"pointer"}}>
                <option value="default">Default</option>
                <option value="dueDate">Due Date</option>
                <option value="priority">Priority</option>
                <option value="created">Newest</option>
              </select>
            </div>}
            {!isMobile&&<div style={{marginLeft:"auto",display:"flex",gap:4}}>{[["kanban","Kanban"],["list","List"],["today","Today"]].map(([v,l])=><button key={v} onClick={()=>setTv(v)} style={B(tv===v)}>{l}</button>)}</div>}
            </div>
            {isMobile&&<div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {["All",...CATEGORIES].map(c=><button key={c} onClick={()=>setFCat(c)} style={{...B(fCat===c),padding:"7px 15px",fontSize:12,whiteSpace:"nowrap"}}>{c}</button>)}
              <button onClick={()=>setHideDone(h=>!h)} style={{...B(hideDone),padding:"7px 15px",fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>{hideDone?"Show done":"Hide done"}</button>
            </div>}
            <div style={{display:"flex",gap:10,marginBottom:18}}>{STATUSES.map(s=>(<div key={s} style={{...C,flex:1,padding:"14px 16px",textAlign:"center",marginBottom:0}}><div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:4}}>{s}</div><div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>{baseFilt.filter(t=>t.status===s).length}</div></div>))}</div>
            {!isMobile&&tv==="kanban"&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
              {STATUSES.map(status=>(<div key={status} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(status)} style={{minHeight:100}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{fontSize:15,fontWeight:700,color:T.text}}>{status}</span><span style={{fontSize:12,color:T.muted,background:T.alt,borderRadius:6,padding:"2px 9px",border:`1px solid ${T.border}`}}>{baseFilt.filter(t=>t.status===status).length}</span></div>{sortT(baseFilt.filter(t=>t.status===status)).map(t=>(<Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} onArchive={archiveTask} onQuickDone={quickDoneTask} T={T} draggable onDragStart={()=>setDragId(t.id)} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(status)}/>))}{baseFilt.filter(t=>t.status===status).length===0&&<div style={{border:`1.5px dashed ${T.border}`,borderRadius:12,padding:24,textAlign:"center"}}><p style={{margin:0,fontSize:12,color:T.muted}}>Drop here</p></div>}</div>))}
            </div>}
            {(isMobile||tv==="list"||tv==="today")&&<div>
              {(tv==="today"||isMobile)&&<>
                <div style={{...C,marginBottom:14,borderLeft:`4px solid ${PRIORITY_COLOR.Medium}`}}><span style={{...L,color:PRIORITY_COLOR.Medium}}>Due Today</span>{todayTasks.length===0?<p style={{color:T.muted,fontSize:14}}>Nothing due today ✓</p>:baseFilt.filter(t=>t.dueDate===TODAY&&t.status!=="Done").map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} onArchive={archiveTask} onQuickDone={quickDoneTask} T={T}/>)}</div>
                <div style={{...C,marginBottom:14,borderLeft:`4px solid ${PRIORITY_COLOR.High}`}}><span style={{...L,color:PRIORITY_COLOR.High}}>Overdue</span>{overdue.length===0?<p style={{color:T.muted,fontSize:14}}>Nothing overdue ✓</p>:baseFilt.filter(t=>t.dueDate&&new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00")&&t.status!=="Done").map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} onArchive={archiveTask} onQuickDone={quickDoneTask} T={T}/>)}</div>
              </>}
              {!isMobile&&tv==="list"&&<>
                {baseFilt.some(t=>t.pinned&&t.status!=="Done")&&<div style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:14,fontWeight:700,color:T.accent}}>Pinned</span><div style={{flex:1,height:1,background:T.border}}/></div>{baseFilt.filter(t=>t.pinned&&t.status!=="Done").map(t=>(<div key={t.id} onClick={()=>setEdit(t)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 16px",marginBottom:6,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"box-shadow 0.15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}><div style={{width:7,height:7,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/><span style={{flex:1,fontSize:14,fontWeight:500,color:T.text}}>{t.title}</span><span style={{fontSize:11,color:T.muted,background:T.alt,padding:"3px 9px",borderRadius:6,border:`1px solid ${T.border}`}}>{t.status}</span>{t.dueDate&&(()=>{const d=dateFmt(t.dueDate);return<span style={{fontSize:11,color:d.over?PRIORITY_COLOR.High:T.muted,fontWeight:d.over?700:400}}>{d.label}</span>;})()}<button onClick={e=>{e.stopPropagation();delTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>×</button></div>))}</div>}
                {CATEGORIES.map(cat=>{const ct=baseFilt.filter(t=>t.category===cat&&!t.pinned);if(!ct.length)return null;return<div key={cat} style={{marginBottom:22}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:8,height:8,borderRadius:"50%",background:CAT_COLOR[cat]}}/><span style={{fontSize:14,fontWeight:700,color:T.text}}>{cat}</span><div style={{flex:1,height:1,background:T.border}}/><span style={{fontSize:12,color:T.muted}}>{ct.length}</span></div>{sortT(ct).map(t=>(<div key={t.id} onClick={()=>setEdit(t)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 16px",marginBottom:6,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"box-shadow 0.15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}><div style={{width:7,height:7,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/><span style={{flex:1,fontSize:14,fontWeight:500,color:t.status==="Done"?T.muted:T.text,textDecoration:t.status==="Done"?"line-through":"none"}}>{t.title}</span><span style={{fontSize:11,color:T.muted,background:T.alt,padding:"3px 9px",borderRadius:6,border:`1px solid ${T.border}`}}>{t.status}</span>{t.dueDate&&(()=>{const d=dateFmt(t.dueDate);return<span style={{fontSize:11,color:d.over?PRIORITY_COLOR.High:T.muted,fontWeight:d.over?700:400}}>{d.label}</span>;})()}<button onClick={e=>{e.stopPropagation();archiveTask(t.id)}} title="Archive" style={{background:"none",border:"none",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center",padding:"2px"}}><Ic n="archive"/></button><button onClick={e=>{e.stopPropagation();delTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>×</button></div>))}</div>;})}
              </>}
              {isMobile&&<>{CATEGORIES.map(cat=>{const ct=baseFilt.filter(t=>t.category===cat&&t.status!=="Done");if(!ct.length)return null;return<div key={cat} style={{marginBottom:18}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:8,height:8,borderRadius:"50%",background:CAT_COLOR[cat]}}/><span style={{fontSize:14,fontWeight:700,color:T.text}}>{cat}</span><div style={{flex:1,height:1,background:T.border}}/><span style={{fontSize:12,color:T.muted}}>{ct.length}</span></div>{sortT(ct).map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} onArchive={archiveTask} onQuickDone={quickDoneTask} T={T}/>)}</div>;})}
              </>}
            </div>}
          </div>}

          {/* LISTS */}
          {view==="lists"&&<div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <span style={{fontSize:isMobile?19:22,fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>My Lists</span>
              <button onClick={()=>setShowNewList(true)} style={{background:T.accent,color:"#fff",border:"none",borderRadius:10,padding:"11px 22px",cursor:"pointer",fontSize:14,fontWeight:700}}>+ New List</button>
            </div>
            {lists.length===0&&<div style={{...C,textAlign:"center",padding:56}}><div style={{color:T.muted,display:"flex",justifyContent:"center",marginBottom:12}}><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><p style={{fontSize:16,color:T.muted,marginBottom:6}}>No lists yet.</p><p style={{fontSize:13,color:T.muted,marginBottom:22}}>Create a checklist, notes pad, link collection or simple list.</p><button onClick={()=>setShowNewList(true)} style={{background:T.accent,color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",cursor:"pointer",fontSize:14,fontWeight:700}}>Create your first list</button></div>}
            {lists.map(list=><ListPanel key={list.id} list={list} onUpdate={updateList} onDelete={deleteList} T={T} compact={false}/>)}
          </div>}

          {/* TIMETABLE */}
          {view==="timetable"&&<TimetableView T={T} isMobile={isMobile}/>}

          {/* COURSES */}
          {view==="courses"&&<div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <span style={{fontSize:isMobile?19:22,fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Semester Tracker</span>
              <span style={{fontSize:12,color:T.muted,background:T.surface,border:`1px solid ${T.border}`,padding:"5px 14px",borderRadius:8,fontWeight:600}}>Week {CURRENT_WEEK} of {WEEKS}</span>
            </div>
            <div style={{...C,marginBottom:18}}>
              <span style={L}>Assignment Deadlines</span>
              {deadlines.length===0&&<p style={{fontSize:13,color:T.muted,marginBottom:14}}>No deadlines added yet.</p>}
              {[...deadlines].sort((a,b)=>a.date>b.date?1:-1).map(d=>{const course=COURSES.find(c=>c.id===d.course),df=dateFmt(d.date);return<div key={d.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`}}><div style={{width:8,height:8,borderRadius:"50%",background:course?.color||T.muted,flexShrink:0}}/><span style={{flex:1,fontSize:14,fontWeight:500,color:T.text}}>{d.title}</span><span style={{fontSize:11,color:course?.color,background:course?.color+"20",padding:"3px 9px",borderRadius:6,fontWeight:600}}>{course?.short}</span><span style={{fontSize:12,color:df?.over?PRIORITY_COLOR.High:PRIORITY_COLOR.Medium,fontWeight:600,minWidth:64,textAlign:"right"}}>{df?.label||d.date}</span><button onClick={()=>delDeadline(d.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18}}>×</button></div>;})}
              <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:10,marginTop:14}}>
                <input value={newDl.title} onChange={e=>setNewDl(x=>({...x,title:e.target.value}))} placeholder="Assignment name…" style={{...inp2,flex:2}}/>
                <div style={{display:"flex",gap:8}}>
                  <select value={newDl.course} onChange={e=>setNewDl(x=>({...x,course:e.target.value}))} style={{...inp2,flex:1,cursor:"pointer"}}>{COURSES.map(c=><option key={c.id} value={c.id}>{c.short}</option>)}</select>
                  <input type="date" value={newDl.date} onChange={e=>setNewDl(x=>({...x,date:e.target.value}))} style={{...inp2,flex:1}}/>
                  <button onClick={addDeadline} style={{background:T.accent,color:"#fff",border:"none",borderRadius:10,padding:"11px 18px",cursor:"pointer",fontSize:14,fontWeight:700}}>Add</button>
                </div>
              </div>
            </div>
            {COURSES.map(course=><CourseWeekGrid key={course.id} course={course} weeks={WEEKS} currentWeek={CURRENT_WEEK} get={get} tog={tog} T={T} examDate={examDates[course.id]} onExamChange={(id,val)=>setExamDates(p=>({...p,[id]:val}))}/>)}
          </div>}

          {/* ARCHIVE */}
          {view==="archive"&&<ArchiveView archive={archive} onRestore={restoreTask} onDelete={id=>setArchive(p=>p.filter(x=>x.id!==id))} T={T} isMobile={isMobile}/>}

        </div>
      </div>

      {edit&&<Modal task={edit} onSave={saveTask} onClose={()=>setEdit(null)} T={T} isMobile={isMobile}/>}
      {showNewList&&<NewListModal onSave={createList} onClose={()=>setShowNewList(false)} T={T} isMobile={isMobile}/>}
      {showSearch&&<SearchModal tasks={tasks} lists={lists} onClose={()=>setShowSearch(false)} T={T} isMobile={isMobile} setView={setView} setEditTask={t=>{setEdit(t);setShowSearch(false);}}/>}
      {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} notifEnabled={notifEnabled} setNotifEnabled={setNotifEnabled} onClose={()=>setShowSettings(false)} T={T} isMobile={isMobile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
