    *{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit',sans-serif}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#C8D4E3;border-radius:6px}
    input,select,textarea{font-family:'Outfit',sans-serif}
    html,body{height:100%;overflow:hidden}
    #root{height:100%;overflow:hidden}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes slideIn{from{transform:translateX(-10px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes popIn{from{transform:scale(0.94);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    .fade-in{animation:fadeIn 0.25s ease both}
    .slide-up{animation:slideUp 0.28s cubic-bezier(0.16,1,0.3,1) both}
    .slide-in{animation:slideIn 0.2s ease both}
    .pop-in{animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1) both}
    .card-enter{animation:slideUp 0.22s ease both}
    .pulse{animation:pulse 2s ease-in-out infinite}
  </style>
