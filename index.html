// ─── Search Modal ─────────────────────────────────────────────────────────────
function SearchModal({tasks,lists,onClose,T,isMobile,setView,setEditTask}){
  const [q,setQ]=useState("");
  const inp=useRef(null);
  useEffect(()=>{setTimeout(()=>inp.current?.focus(),50);},[]);
  const results=useMemo(()=>{
    if(!q.trim())return[];
    const ql=q.toLowerCase();
    const tr=tasks.filter(t=>t.title.toLowerCase().includes(ql)||t.notes?.toLowerCase().includes(ql)).map(t=>({type:"task",item:t}));
    const lr=[];
    lists.forEach(l=>{
      if(l.name.toLowerCase().includes(ql))lr.push({type:"list",item:l,label:l.name});
      if(l.type==="notes"&&l.content?.toLowerCase().includes(ql))lr.push({type:"list",item:l,label:l.name+" (notes)"});
      (l.items||[]).filter(i=>(i.text||i.url||"").toLowerCase().includes(ql)).forEach(i=>lr.push({type:"listitem",item:i,list:l,label:`${l.name} → ${i.text||i.url}`}));
    });
    return[...tr,...lr].slice(0,12);
  },[q,tasks,lists]);
  const ov=isMobile?{position:"fixed",inset:0,background:"rgba(46,52,64,0.7)",zIndex:1000,display:"flex",alignItems:"flex-start",paddingTop:60}:{position:"fixed",inset:0,background:"rgba(46,52,64,0.5)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80};
  return(
    <div style={ov} onClick={onClose} className="fade-in">
      <div style={{background:T.surface,borderRadius:14,width:"100%",maxWidth:560,margin:"0 16px",border:`1px solid ${T.border}`,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}} className="pop-in" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>

// ─── Calendar ────────────────────────────────────────────────────────────────
function Cal({tasks,T}){const now=new Date();const[mo,setMo]=useState(now.getMonth());const[yr,setYr]=useState(now.getFullYear());const dim=new Date(yr,mo+1,0).getDate(),fd=(new Date(yr,mo,1).getDay()+6)%7;const byDay={};tasks.forEach(t=>{if(!t.dueDate||t.status==="Done")return;const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()===mo&&d.getFullYear()===yr){const k=d.getDate();byDay[k]=[...(byDay[k]||[]),t];}});const mn=new Date(yr,mo,1).toLocaleString("en-GB",{month:"long",year:"numeric"});const td=new Date().getDate(),tm=new Date().getMonth(),ty=new Date().getFullYear();return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16,padding:"2px 6px"}}>‹</button><span style={{fontSize:13,fontWeight:600,color:T.text}}>{mn}</span><button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16,padding:"2px 6px"}}>›</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>{["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{fontSize:10,color:T.muted,fontWeight:700,padding:"3px 0"}}>{d}</div>)}{Array(fd).fill(null).map((_,i)=><div key={`e${i}`}/>)}{Array(dim).fill(null).map((_,i)=>{const day=i+1,has=byDay[day],isToday=day===td&&mo===tm&&yr===ty;const over=has?.some(t=>new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00"));return<div key={day} style={{padding:"4px 2px",borderRadius:5,fontSize:12,background:isToday?T.accent:"transparent",color:isToday?T.fg:has?(over?PRIORITY_COLOR.High:T.accent):T.muted,fontWeight:isToday||has?600:400}}>{day}{has&&!isToday&&<div style={{width:3,height:3,borderRadius:"50%",background:over?PRIORITY_COLOR.High:T.accent,margin:"1px auto 0"}}/>}</div>;})}</div></div>);}

    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,marginBottom:12,overflow:"hidden"}} className="slide-in">
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",borderBottom:open?`1px solid ${T.border}`:"none",background:T.alt,transition:"background 0.15s"}}>
        <div style={{width:10,height:10,borderRadius:2,background:course.color,flexShrink:0}}/>
        <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{course.name}</span>
        <span style={{fontSize:11,color:pct===100?"#A3BE8C":T.muted,fontWeight:600,marginRight:8}}>{done}/{total} · {pct}%</span>
        <div style={{width:60,height:4,background:T.border,borderRadius:2,marginRight:8}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#A3BE8C":course.color,borderRadius:2,transition:"width 0.4s"}}/></div>
        <span style={{fontSize:12,color:T.muted,transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(0)":"rotate(-90deg)"}}>▼</span>
      </div>
      {open&&<div style={{padding:"0 18px 16px"}}><div style={{overflowX:"auto",marginTop:14}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
          <thead><tr><th style={{textAlign:"left",fontSize:10,fontWeight:700,color:T.muted,paddingBottom:10,textTransform:"uppercase",width:50}}>Week</th>{course.fields.map(f=><th key={f} style={{fontSize:10,fontWeight:700,color:T.muted,paddingBottom:10,textAlign:"center",textTransform:"uppercase"}}>{FIELD_LABELS[f]}</th>)}<th style={{fontSize:10,fontWeight:700,color:T.muted,paddingBottom:10,textAlign:"center",textTransform:"uppercase"}}>Done</th></tr></thead>
          <tbody>{Array.from({length:weeks},(_,i)=>i+1).map(wk=>{const wkDone=course.fields.filter(f=>get(course.id,wk,f)).length;const allDone=wkDone===course.fields.length,isCurrent=wk===currentWeek;return<tr key={wk} style={{borderTop:`1px solid ${T.border}`,background:isCurrent?T.accent+"18":"transparent"}}><td style={{padding:"10px 0",fontSize:12,fontWeight:isCurrent?700:400,color:isCurrent?T.accent:T.text}}>Wk {wk}{isCurrent&&<span style={{fontSize:9,fontWeight:700,color:T.accent,marginLeft:4,background:T.accent+"22",padding:"1px 5px",borderRadius:3}}>now</span>}</td>{course.fields.map(f=><td key={f} style={{textAlign:"center",padding:"10px 8px"}}><div style={{display:"flex",justifyContent:"center"}}><Check checked={get(course.id,wk,f)} onChange={()=>tog(course.id,wk,f)} color={course.color} T={T}/></div></td>)}<td style={{textAlign:"center",padding:"10px 8px"}}><span style={{fontSize:11,fontWeight:600,color:allDone?"#A3BE8C":T.muted}}>{allDone?"✓":""}{wkDone}/{course.fields.length}</span></td></tr>;})}
          </tbody>
        </table>
      </div></div>}
    </div>
  );
}

// ─── List Panel (with types) ──────────────────────────────────────────────────
function ListPanel({list,onUpdate,onDelete,T,compact}){
  const[newText,setNewText]=useState("");
  const[editingName,setEditingName]=useState(false);
  const[nameVal,setNameVal]=useState(list.name);
  const[open,setOpen]=useState(true);
  const[editColor,setEditColor]=useState(false);
  const dragOver=useRef(null),dragItem=useRef(null);
  const type=list.type||"checklist";
  const items=[...(list.items||[])].sort((a,b)=>a.order-b.order);
  const doneCount=items.filter(i=>i.done).length;
  const upd=newList=>onUpdate(newList);
  const updItems=newItems=>upd({...list,items:newItems});
  const addItem=()=>{
    if(!newText.trim())return;
    const max=items.length?Math.max(...items.map(i=>i.order))+1:0;
    const newItem={id:`li${Date.now()}`,text:newText.trim(),url:type==="links"?newText.trim():"",note:"",done:false,order:max};
    updItems([...list.items,newItem]);
    setNewText("");
  };
  const toggleItem=id=>updItems(list.items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const deleteItem=id=>updItems(list.items.filter(i=>i.id!==id));
  const updateItemText=(id,text)=>updItems(list.items.map(i=>i.id===id?{...i,text}:i));
  const saveName=()=>{if(nameVal.trim())upd({...list,name:nameVal.trim()});setEditingName(false);};
  const dragHandlersFor=idx=>({
    onDragStart:e=>{dragItem.current=idx;e.dataTransfer.effectAllowed="move";},
    onDragOver:e=>{e.preventDefault();dragOver.current=idx;},
    onDrop:e=>{e.preventDefault();if(dragItem.current===null||dragItem.current===dragOver.current)return;const s=[...list.items].sort((a,b)=>a.order-b.order);const m=s.splice(dragItem.current,1)[0];s.splice(dragOver.current,0,m);updItems(s.map((it,i)=>({...it,order:i})));dragItem.current=null;dragOver.current=null;},
    onDragEnd:()=>{dragItem.current=null;dragOver.current=null;}
  });

  const typeInfo=LIST_TYPES.find(t=>t.id===type)||LIST_TYPES[0];
  const inp_s={flex:1,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",fontSize:14,color:T.text,background:T.alt,outline:"none"};

  if(compact){
    return(
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`3px solid ${list.color}`,borderRadius:12,padding:16}} className="card-enter">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:13}}>{"•"}</span>
          <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{list.name}</span>
          {type==="checklist"&&<span style={{fontSize:12,color:T.muted}}>{doneCount}/{items.length}</span>}
        </div>
        {type==="notes"&&<p style={{fontSize:13,color:T.muted,lineHeight:1.5,maxHeight:80,overflow:"hidden"}}>{list.content||"No notes yet."}</p>}
        {type!=="notes"&&items.length===0&&<p style={{fontSize:13,color:T.muted}}>No items yet.</p>}
        {type!=="notes"&&items.slice(0,4).map(item=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
            {type==="checklist"&&<Check checked={item.done} onChange={()=>toggleItem(item.id)} color={list.color} T={T}/>}
            {type==="simple"&&<div style={{width:5,height:5,borderRadius:"50%",background:list.color,flexShrink:0,marginLeft:2}}/>}
            {type==="links"&&<span style={{fontSize:13,flexShrink:0}}>🔗</span>}
            {type==="links"
              ?<a href={item.url||item.text} target="_blank" rel="noreferrer" style={{flex:1,fontSize:13,color:T.accent,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text||item.url}</a>
              :<span style={{flex:1,fontSize:13,color:item.done?T.muted:T.text,textDecoration:item.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</span>
            }
          </div>
        ))}
        {items.length>4&&<p style={{fontSize:12,color:T.muted,marginTop:7}}>+{items.length-4} more</p>}
        {type==="checklist"&&items.length>0&&<div style={{marginTop:11,height:3,background:T.border,borderRadius:2}}><div style={{height:"100%",width:`${Math.round((doneCount/items.length)*100)}%`,background:list.color,borderRadius:2,transition:"width 0.3s"}}/></div>}
      </div>
    );
  }

  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,marginBottom:14,overflow:"hidden"}} className="slide-in">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:open?`1px solid ${T.border}`:"none",background:T.alt}}>
        <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setEditColor(v=>!v)}>
          <div style={{width:10,height:10,borderRadius:2,background:list.color}}/>
          {editColor&&<div style={{position:"absolute",top:16,left:0,background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:8,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5,zIndex:50,width:130}} onClick={e=>e.stopPropagation()}>
            {LIST_COLORS.map(c=><div key={c} onClick={()=>{upd({...list,color:c});setEditColor(false);}} style={{width:16,height:16,borderRadius:3,background:c,cursor:"pointer",border:c===list.color?`2px solid ${T.text}`:"2px solid transparent"}}/>)}
          </div>}
        </div>
        <span style={{fontSize:12,color:T.muted,flexShrink:0}}>{"•"}</span>
        {editingName
          ?<input autoFocus value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape"){setNameVal(list.name);setEditingName(false);}}} style={{flex:1,border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 9px",fontSize:14,fontWeight:700,color:T.text,background:T.surface,outline:"none"}}/>
          :<span onClick={()=>setEditingName(true)} style={{fontSize:14,fontWeight:700,color:T.text,flex:1,cursor:"text"}}>{list.name}</span>
        }
        <span style={{fontSize:10,color:T.muted,background:T.border,padding:"2px 7px",borderRadius:4,fontWeight:600,flexShrink:0}}>{typeInfo.label}</span>
        {type==="checklist"&&items.length>0&&<><span style={{fontSize:12,color:doneCount===items.length?"#A3BE8C":T.muted,fontWeight:600,marginRight:4}}>{doneCount}/{items.length}</span><div style={{width:50,height:3,background:T.border,borderRadius:2,marginRight:8}}><div style={{height:"100%",width:`${Math.round((doneCount/items.length)*100)}%`,background:list.color,borderRadius:2,transition:"width 0.3s"}}/></div></>}
        <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13,padding:"2px 4px"}}>{open?"▲":"▼"}</button>
        <button onClick={()=>onDelete(list.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,padding:0,lineHeight:1}}>×</button>
      </div>

      {open&&<div style={{padding:"14px 18px"}}>
        {/* Notes type */}
        {type==="notes"&&<textarea value={list.content||""} onChange={e=>upd({...list,content:e.target.value})} placeholder="Start writing your notes here…" style={{width:"100%",minHeight:180,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px 14px",fontSize:14,color:T.text,background:T.alt,outline:"none",resize:"vertical",lineHeight:1.6}}/>}

        {/* Checklist / Simple / Links types */}
        {type!=="notes"&&<>
          {items.length===0&&<p style={{fontSize:14,color:T.muted,marginBottom:12}}>No items yet — add one below.</p>}
          {items.map((item,idx)=>(
            <div key={item.id} draggable onDragStart={dragHandlersFor(idx).onDragStart} onDragOver={dragHandlersFor(idx).onDragOver} onDrop={dragHandlersFor(idx).onDrop} onDragEnd={dragHandlersFor(idx).onDragEnd}
              style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:"10px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:10,opacity:item.done?0.6:1,transition:"opacity 0.15s"}}>
              {type!=="links"&&<span style={{color:T.border,cursor:"grab",userSelect:"none",display:"flex",alignItems:"center"}}><Ic n="drag" color={T.border}/></span>}
              {type==="checklist"&&<Check checked={item.done} onChange={()=>toggleItem(item.id)} color={list.color} T={T}/>}
              {type==="simple"&&<div style={{width:6,height:6,borderRadius:"50%",background:list.color,flexShrink:0}}/>}
              {type==="links"&&<span style={{fontSize:16,flexShrink:0}}>🔗</span>}
              {type==="links"
                ?<div style={{flex:1,minWidth:0}}>
                    <input value={item.text||""} onChange={e=>updateItemText(item.id,e.target.value)} placeholder="Label" style={{width:"100%",border:"none",outline:"none",background:"transparent",fontSize:13,fontWeight:600,color:T.text,marginBottom:2}}/>
                    <input value={item.url||""} onChange={e=>updItems(list.items.map(i=>i.id===item.id?{...i,url:e.target.value}:i))} placeholder="https://…" style={{width:"100%",border:"none",outline:"none",background:"transparent",fontSize:12,color:T.accent}}/>
                  </div>
                :<input value={item.text||""} onChange={e=>updateItemText(item.id,e.target.value)} style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:14,color:item.done?T.muted:T.text,textDecoration:item.done?"line-through":"none"}}/>
              }
              {type==="links"&&item.url&&<a href={item.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:T.accent,background:T.accent+"22",padding:"3px 8px",borderRadius:4,textDecoration:"none",flexShrink:0,fontWeight:600}}>Open</a>}
              <button onClick={()=>deleteItem(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,padding:0,lineHeight:1,flexShrink:0}}>×</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder={type==="links"?"Paste a URL…":"Add item…"} style={inp_s}/>
            <button onClick={addItem} style={{background:list.color,color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:14,fontWeight:600}}>Add</button>
          </div>
        </>}
      </div>}
    </div>
  );
}

// ─── New List Modal ───────────────────────────────────────────────────────────
function NewListModal({onSave,onClose,T,isMobile}){
  const[name,setName]=useState("");
  const[color,setColor]=useState(LIST_COLORS[0]);
  const[type,setType]=useState("checklist");
  const inp={width:"100%",border:`1px solid ${T.border}`,borderRadius:8,padding:"11px 13px",fontSize:14,color:T.text,background:T.alt,outline:"none"};
  const save=()=>{if(!name.trim())return;onSave({id:`l${Date.now()}`,name:name.trim(),color,type,createdAt:new Date().toISOString(),items:[],content:""});};
  const ov=isMobile?{position:"fixed",inset:0,background:"rgba(46,52,64,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end"}:{position:"fixed",inset:0,background:"rgba(46,52,64,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16};
  const inn=isMobile?{background:T.surface,borderRadius:"16px 16px 0 0",width:"100%",padding:"20px 20px 32px"}:{background:T.surface,borderRadius:12,width:"100%",maxWidth:420,padding:24,border:`1px solid ${T.border}`};
  return(
    <div style={ov} onClick={onClose} className="fade-in">
      <div style={inn} className="slide-up" onClick={e=>e.stopPropagation()}>
        {isMobile&&<div style={{width:36,height:4,borderRadius:2,background:T.border,margin:"0 auto 18px"}}/>}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
          <span style={{fontSize:16,fontWeight:700,color:T.text}}>New List</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:T.muted}}>×</button>
        </div>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:6}}>Name</label>
        <input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="e.g. Grocery list" style={{...inp,marginBottom:16}}/>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:8}}>Type</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {LIST_TYPES.map(lt=>(
            <button key={lt.id} onClick={()=>setType(lt.id)} style={{padding:"10px 12px",borderRadius:10,border:type===lt.id?`2px solid ${T.accent}`:`1px solid ${T.border}`,background:type===lt.id?T.accent+"12":"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{fontSize:18,marginBottom:4}}>{lt.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:type===lt.id?T.accent:T.text}}>{lt.label}</div>
              <div style={{fontSize:11,color:T.muted}}>{lt.desc}</div>
            </button>
          ))}
        </div>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:8}}>Colour</label>
        <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:22}}>
          {LIST_COLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:5,background:c,cursor:"pointer",border:c===color?`2.5px solid ${T.text}`:`2px solid transparent`,transition:"transform 0.1s"}}/>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={save} style={{flex:1,background:color,color:"#fff",border:"none",borderRadius:9,padding:13,cursor:"pointer",fontSize:15,fontWeight:600}}>Create</button>
          <button onClick={onClose} style={{flex:1,background:T.alt,color:T.muted,border:"none",borderRadius:9,padding:13,cursor:"pointer",fontSize:15}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}


// ─── Archive View ─────────────────────────────────────────────────────────────

          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,fontWeight:600,color:T.muted,textDecoration:"line-through",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</p>
            <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:CAT_COLOR[t.category],background:CAT_COLOR[t.category]+"22",padding:"2px 7px",borderRadius:4,fontWeight:600}}>{t.category}</span>
              <span style={{fontSize:10,color:T.muted}}>{t.archivedAt?new Date(t.archivedAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):""}</span>
            </div>
          </div>
          <button onClick={()=>onRestore(t.id)} style={{background:T.alt,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 12px",cursor:"pointer",color:T.text,fontWeight:600,flexShrink:0,display:"flex",alignItems:"center",gap:5,fontSize:12}}><Ic n="restore" color={T.accent}/>Restore</button>
          <button onClick={()=>onDelete(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18,flexShrink:0}}>×</button>
        </div>
      ))}
    </div>
  );
}

// ─── Mobile Dashboard ─────────────────────────────────────────────────────────
function MobileDashboard({lists,todayTasks,updateList,deleteList,setView,T}){

        </div>
        {todayTasks.length===0?<div style={{textAlign:"center",padding:"16px 0"}}><div style={{display:"flex",justifyContent:"center",marginBottom:6,color:"#A3BE8C"}}><Ic n="check" size={28}/></div><p style={{fontSize:13,color:T.muted}}>Nothing due today</p></div>
          :todayTasks.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/>
              <span style={{flex:1,fontSize:14,color:T.text,fontWeight:500}}>{t.title}</span>
              <span style={{fontSize:11,color:CAT_COLOR[t.category],background:CAT_COLOR[t.category]+"22",padding:"2px 7px",borderRadius:4,fontWeight:600}}>{t.category}</span>
            </div>
          ))
        }
      </div>
      {lists.length>0&&<div style={C}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{...L,marginBottom:0}}>My Lists</span>
          <button onClick={()=>setView("lists")} style={{background:"none",border:"none",cursor:"pointer",color:T.accent,fontSize:12,fontWeight:600}}>View all →</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {lists.map(list=><ListPanel key={list.id} list={list} onUpdate={updateList} onDelete={deleteList} T={T} compact={true}/>)}
        </div>
      </div>}
      {lists.length===0&&<div style={{...C,textAlign:"center",padding:24}}><p style={{fontSize:13,color:T.muted,marginBottom:10}}>No lists yet.</p><button onClick={()=>setView("lists")} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>Create a list</button></div>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[tasks,setTasks]       =useState(()=>lsGet("h-tasks-html",INITIAL_TASKS));
  const[cd,setCd]             =useState(()=>lsGet("h-courses-html",{}));
  const[deadlines,setDeadlines]=useState(()=>lsGet("h-dl-html",[]));
  const[lists,setLists]       =useState(()=>lsGet("h-lists-html",INITIAL_LISTS));
  const[view,setView]         =useState("dashboard");
  const[tv,setTv]             =useState("list");
  const[edit,setEdit]         =useState(null);
  const[theme,setTheme]       =useState(()=>lsGet("h-theme-html","polar"));
  const[fCat,setFCat]         =useState("All");
  const[search,setSearch]     =useState("");
  const[dragId,setDragId]     =useState(null);
  const[newDl,setNewDl]       =useState({title:"",course:"maths",date:"",notes:""});
  const[showNewList,setShowNewList]=useState(false);
  const[showSearch,setShowSearch]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[syncStatus,setSyncStatus]=useState("idle");
  const[loaded,setLoaded]     =useState(false);
  const[notifEnabled,setNotifEnabled]=useState(()=>lsGet("h-notif",false));
  const syncTimer=useRef(null);
  const isMobile=useIsMobile();
  const T=THEMES[theme];

  window.__setTasks=setTasks;

  // ── Load from Supabase ───────────────────────────────────────────────────
  useEffect(()=>{
    async function loadAll(){
      setSyncStatus("syncing");
      try{
        const[tR,lR,dR,cR,thV]=await Promise.all([sbGetAll("tasks"),sbGetAll("lists"),sbGetAll("deadlines"),sbGetAll("courses"),sbGetSetting("theme")]);
        if(tR!==null){const ld=tR.map(r=>r.data);if(ld.length>0){setTasks(ld);lsSet("h-tasks-html",ld);}}
        if(lR!==null){const ld=lR.map(r=>r.data);if(ld.length>0){setLists(ld);lsSet("h-lists-html",ld);}}
        if(dR!==null){const ld=dR.map(r=>r.data);setDeadlines(ld);lsSet("h-dl-html",ld);}
        if(cR!==null){const obj={};cR.forEach(r=>{Object.assign(obj,r.data);});if(Object.keys(obj).length>0){setCd(obj);lsSet("h-courses-html",obj);}}
        if(thV){setTheme(thV);lsSet("h-theme-html",thV);}
        const aR=await sbGetSetting("archive");if(aR){setArchive(aR);lsSet("h-archive-html",aR);}
        setSyncStatus("synced");
      }catch{setSyncStatus("offline");}
      setLoaded(true);
    }
    loadAll();
  },[]);

  const debouncedSync=useCallback((fn)=>{
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{setSyncStatus("syncing");const ok=await fn();setSyncStatus(ok?"synced":"offline");},600);
  },[]);

  useEffect(()=>{if(!loaded)return;lsSet("h-tasks-html",tasks);debouncedSync(async()=>{const r=await Promise.all(tasks.map(t=>sbUpsert("tasks",t.id,t)));return r.every(Boolean);});},[tasks]);
  useEffect(()=>{if(!loaded)return;lsSet("h-lists-html",lists);debouncedSync(async()=>{const r=await Promise.all(lists.map(l=>sbUpsert("lists",l.id,l)));return r.every(Boolean);});},[lists]);
  useEffect(()=>{if(!loaded)return;lsSet("h-dl-html",deadlines);debouncedSync(async()=>{const r=await Promise.all(deadlines.map(d=>sbUpsert("deadlines",d.id,d)));return r.every(Boolean);});},[deadlines]);
  useEffect(()=>{if(!loaded)return;lsSet("h-courses-html",cd);debouncedSync(async()=>await sbUpsert("courses","cd-main",cd));},[cd]);
  useEffect(()=>{lsSet("h-theme-html",theme);document.body.style.background=T.bg;if(loaded)sbSetSetting("theme",theme);},[theme]);
  useEffect(()=>{lsSet("h-notif",notifEnabled);},[notifEnabled]);
  useEffect(()=>{if(!loaded)return;lsSet("h-archive-html",archive);debouncedSync(async()=>await sbSetSetting("archive",archive));},[archive]);

  // Schedule notifications for upcoming tasks
  useEffect(()=>{if(notifEnabled&&Notification.permission==="granted"){tasks.filter(t=>t.status!=="Done"&&t.dueDate).forEach(scheduleNotification);}},[tasks,notifEnabled]);

  // Keyboard shortcut: Cmd/Ctrl+K for search
  useEffect(()=>{
    const handler=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);}};
    window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler);
  },[]);

  const archiveTask=id=>{const t=tasks.find(x=>x.id===id);if(!t)return;setArchive(p=>[...p,{...t,archivedAt:new Date().toISOString()}]);setTasks(p=>p.filter(x=>x.id!==id));sbDelete("tasks",id);};
  const restoreTask=id=>{const t=archive.find(x=>x.id===id);if(!t)return;const{archivedAt,...task}=t;setTasks(p=>[...p,{...task,status:"To Do"}]);setArchive(p=>p.filter(x=>x.id!==id));};
  const saveTask=t=>{setTasks(p=>p.find(x=>x.id===t.id)?p.map(x=>x.id===t.id?t:x):[...p,t]);setEdit(null);};
  const delTask=async id=>{setTasks(p=>p.filter(t=>t.id!==id));await sbDelete("tasks",id);};
  const pinTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,pinned:!t.pinned}:t));
  const quickDone=id=>setTasks(p=>p.map(t=>t.id===id?{...t,status:t.status==="Done"?"To Do":"Done"}:t));
  const tog=(cid,wk,fld)=>setCd(p=>({...p,[`${cid}-${wk}-${fld}`]:!p[`${cid}-${wk}-${fld}`]}));
  const get=(cid,wk,fld)=>!!cd[`${cid}-${wk}-${fld}`];
  const sortT=arr=>[...arr].sort((a,b)=>(a.pinned===b.pinned)?0:a.pinned?-1:1);
  const updateList=updated=>setLists(p=>p.map(l=>l.id===updated.id?updated:l));
  const deleteList=async id=>{setLists(p=>p.filter(l=>l.id!==id));await sbDelete("lists",id);};
  const createList=l=>{setLists(p=>[...p,l]);setShowNewList(false);};
  const addDeadline=()=>{if(!newDl.title||!newDl.date)return;setDeadlines(p=>[...p,{id:`dl${Date.now()}`,...newDl}]);setNewDl({title:"",course:"maths",date:"",notes:""});};
  const delDeadline=async id=>{setDeadlines(p=>p.filter(x=>x.id!==id));await sbDelete("deadlines",id);};
  const handleDrop=status=>{if(!dragId)return;setTasks(p=>p.map(t=>t.id===dragId?{...t,status}:t));setDragId(null);};

  const baseFiltRaw=tasks.filter(t=>(fCat==="All"||t.category===fCat)&&(!search||t.title.toLowerCase().includes(search.toLowerCase())));
  const baseFilt=useMemo(()=>{const a=[...baseFiltRaw];if(sortBy==="due")a.sort((x,y)=>(!x.dueDate?1:!y.dueDate?-1:x.dueDate>y.dueDate?1:-1));else if(sortBy==="priority"){const o={High:0,Medium:1,Low:2};a.sort((x,y)=>o[x.priority]-o[y.priority]);}else if(sortBy==="new")a.sort((x,y)=>y.createdAt>x.createdAt?1:-1);return a;},[baseFiltRaw,sortBy]);
  const todayTasks=tasks.filter(t=>t.dueDate===TODAY&&t.status!=="Done");
  const urgentTask=tasks.filter(t=>isUrgent(t)&&t.status!=="Done");
  const overdue=tasks.filter(t=>t.dueDate&&new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00")&&t.status!=="Done");
  const upcomingDl=[...deadlines].sort((a,b)=>a.date>b.date?1:-1).filter(d=>d.date>=TODAY).slice(0,5);
  const wkSum=COURSES.map(c=>{const done=c.fields.filter(f=>get(c.id,CURRENT_WEEK,f)).length;return{...c,done,total:c.fields.length,pct:Math.round((done/c.fields.length)*100)};});
  const totI=wkSum.reduce((a,c)=>a+c.total,0),doneI=wkSum.reduce((a,c)=>a+c.done,0);

  const C={background:T.surface,border:`1px solid ${T.border}`,borderRadius:isMobile?12:10,padding:isMobile?16:20};
  const L={fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.1em",display:"block",marginBottom:8};
  const B=a=>({background:a?T.accent:"transparent",color:a?"#fff":T.muted,border:`1px solid ${a?T.accent:T.border}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:a?600:400,transition:"all 0.15s"});
  const inp2={border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",fontSize:isMobile?14:12,color:T.text,background:T.alt,outline:"none"};

  if(!loaded){return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{width:28,height:28,borderRadius:"50%",border:`3px solid ${T.border}`,borderTop:`3px solid ${T.accent}`,animation:"spin 1s linear infinite"}}/><span style={{fontSize:13,color:T.muted}}>Loading your data…</span></div>);}

  const contentPad=isMobile?"16px":"24px";

  return(
    <div style={{height:"100vh",background:T.bg,transition:"background 0.3s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{`input:focus,select:focus,textarea:focus{border-color:${T.accent}!important;outline:none}@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {!isMobile&&<DesktopNav view={view} setView={setView} theme={theme} syncStatus={syncStatus} T={T} onSearch={()=>setShowSearch(true)} onSettings={()=>setShowSettings(true)}/>}

      {isMobile&&<div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{padding:"12px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:8,height:8,borderRadius:2,background:T.accent}}/>
            <span style={{fontSize:16,fontWeight:700,color:T.text}}>Harry</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <SyncDot status={syncStatus}/>
            <button onClick={()=>setShowSearch(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 9px",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 9px",cursor:"pointer",color:T.muted,display:"flex",alignItems:"center"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",padding:"8px 12px 0",gap:2,WebkitOverflowScrolling:"touch"}}>
          {[["dashboard","Home"],["tasks","Tasks"],["lists","Lists"],["courses","Courses"],["archive","Archive"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{whiteSpace:"nowrap",flexShrink:0,background:"none",border:"none",borderBottom:view===v?`2px solid ${T.accent}`:"2px solid transparent",color:view===v?T.accent:T.muted,fontWeight:view===v?700:400,fontSize:14,padding:"6px 16px 10px",cursor:"pointer",transition:"color 0.15s"}}>{l}</button>
          ))}
        </div>
      </div>}

      <div style={{flex:1,overflowY:"auto",padding:contentPad}} className="fade-in">
        <div style={{maxWidth:isMobile?"100%":1140,margin:"0 auto"}}>

          {/* DASHBOARD */}
          {view==="dashboard"&&(isMobile
            ?<MobileDashboard lists={lists} todayTasks={todayTasks} updateList={updateList} deleteList={deleteList} setView={setView} T={T}/>
            :<div className="fade-in">
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
                {[{l:"Active Tasks",v:tasks.filter(t=>t.status!=="Done").length,c:T.text},{l:"Due Today",v:todayTasks.length,c:todayTasks.length?PRIORITY_COLOR.Medium:T.text},{l:"Overdue",v:overdue.length,c:overdue.length?PRIORITY_COLOR.High:T.text},{l:"In Progress",v:tasks.filter(t=>t.status==="In Progress").length,c:T.accent}].map(x=>(
                  <div key={x.l} style={C}><span style={L}>{x.l}</span><div style={{fontSize:26,fontWeight:700,color:x.c,lineHeight:1}}>{x.v}</div>{x.s&&<div style={{fontSize:11,color:T.muted,marginTop:3}}>{x.s}</div>}</div>
                ))}
              </div>
              <div style={{marginBottom:14}}><QuickAdd onAdd={t=>setTasks(p=>[...p,t])} T={T} isMobile={false}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1.6fr",gap:14,marginBottom:14}}>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <span style={L}>All Tasks</span>

                    const catTasks=tasks.filter(t=>t.category===cat&&t.status!=="Done");

                      <div key={cat} style={{marginBottom:14}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

                          <span style={{fontSize:12,fontWeight:700,color:T.text,flex:1}}>{cat}</span>
                          {urgent.length>0&&<span style={{fontSize:10,fontWeight:700,color:PRIORITY_COLOR.High,background:PRIORITY_COLOR.High+"18",padding:"1px 7px",borderRadius:4}}>{urgent.length} urgent</span>}
                          <span style={{fontSize:11,color:T.muted}}>{catTasks.length}</span>
                        </div>
                        {catTasks.slice(0,3).map(t=>{

                            <div key={t.id} onClick={()=>setEdit(t)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,marginBottom:3,cursor:"pointer",background:isUrgent(t)?PRIORITY_COLOR.High+"10":T.alt,transition:"background 0.1s"}}

            <div style={{display:"flex",gap:8,marginBottom:14}}>{STATUSES.map(s=>(<div key={s} style={{...C,flex:1,padding:"10px 12px",textAlign:"center",marginBottom:0}}><div style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{s}</div><div style={{fontSize:22,fontWeight:700,color:T.text}}>{baseFilt.filter(t=>t.status===s).length}</div></div>))}</div>
            {!isMobile&&tv==="kanban"&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
              {STATUSES.map(status=>(<div key={status} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(status)} style={{minHeight:80}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:14,fontWeight:600,color:T.text}}>{status}</span><span style={{fontSize:11,color:T.muted,background:T.alt,borderRadius:4,padding:"1px 7px",border:`1px solid ${T.border}`}}>{baseFilt.filter(t=>t.status===status).length}</span></div>{sortT(baseFilt.filter(t=>t.status===status)).map(t=>(<Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} T={T} draggable onDragStart={()=>setDragId(t.id)} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(status)}/>))}{baseFilt.filter(t=>t.status===status).length===0&&<div style={{border:`1.5px dashed ${T.border}`,borderRadius:8,padding:20,textAlign:"center"}}><p style={{margin:0,fontSize:11,color:T.muted}}>Drop here</p></div>}</div>))}
            </div>}
            {(isMobile||tv==="list"||tv==="today")&&<div>
              {(tv==="today"||isMobile)&&<>
                <div style={{...C,marginBottom:12,borderLeft:`3px solid ${PRIORITY_COLOR.Medium}`}}><span style={{...L,color:PRIORITY_COLOR.Medium}}>Due Today</span>{todayTasks.length===0?<p style={{color:T.muted,fontSize:14}}>Nothing due today ✓</p>:baseFilt.filter(t=>t.dueDate===TODAY&&t.status!=="Done").map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} T={T}/>)}</div>
                <div style={{...C,marginBottom:12,borderLeft:`3px solid ${PRIORITY_COLOR.High}`}}><span style={{...L,color:PRIORITY_COLOR.High}}>Overdue</span>{overdue.length===0?<p style={{color:T.muted,fontSize:14}}>Nothing overdue ✓</p>:baseFilt.filter(t=>t.dueDate&&new Date(t.dueDate+"T12:00:00")<new Date(TODAY+"T12:00:00")&&t.status!=="Done").map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} T={T}/>)}</div>
              </>}
              {!isMobile&&tv==="list"&&<>
                {baseFilt.some(t=>t.pinned&&t.status!=="Done")&&<div style={{marginBottom:18}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><span style={{fontSize:13,fontWeight:700,color:T.accent}}>Pinned</span><div style={{flex:1,height:1,background:T.border}}/></div>{baseFilt.filter(t=>t.pinned&&t.status!=="Done").map(t=>(<div key={t.id} onClick={()=>setEdit(t)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,padding:"10px 13px",marginBottom:5,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(46,52,64,0.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}><div style={{width:6,height:6,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/><span style={{flex:1,fontSize:13,fontWeight:500,color:T.text}}>{t.title}</span><span style={{fontSize:10,color:T.muted,background:T.alt,padding:"2px 8px",borderRadius:4,border:`1px solid ${T.border}`}}>{t.status}</span>{t.dueDate&&(()=>{const d=dateFmt(t.dueDate);return<span style={{fontSize:10,color:d.over?PRIORITY_COLOR.High:T.muted,fontWeight:d.over?700:400}}>{d.label}</span>;})()}<button onClick={e=>{e.stopPropagation();delTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>×</button></div>))}</div>}
                {CATEGORIES.map(cat=>{const ct=baseFilt.filter(t=>t.category===cat&&!t.pinned);if(!ct.length)return null;return<div key={cat} style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLOR[cat]}}/><span style={{fontSize:13,fontWeight:700,color:T.text}}>{cat}</span><div style={{flex:1,height:1,background:T.border}}/><span style={{fontSize:11,color:T.muted}}>{ct.length}</span></div>{sortT(ct).map(t=>(<div key={t.id} onClick={()=>setEdit(t)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,padding:"10px 13px",marginBottom:5,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(46,52,64,0.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}><div style={{width:6,height:6,borderRadius:"50%",background:PRIORITY_COLOR[t.priority],flexShrink:0}}/><span style={{flex:1,fontSize:13,fontWeight:500,color:t.status==="Done"?T.muted:T.text,textDecoration:t.status==="Done"?"line-through":"none"}}>{t.title}</span><span style={{fontSize:10,color:T.muted,background:T.alt,padding:"2px 8px",borderRadius:4,border:`1px solid ${T.border}`}}>{t.status}</span>{t.dueDate&&(()=>{const d=dateFmt(t.dueDate);return<span style={{fontSize:10,color:d.over?PRIORITY_COLOR.High:T.muted,fontWeight:d.over?700:400}}>{d.label}</span>;})()}<button onClick={e=>{e.stopPropagation();delTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>×</button></div>))}</div>;})}
              </>}
              {isMobile&&<>{CATEGORIES.map(cat=>{const ct=baseFilt.filter(t=>t.category===cat&&t.status!=="Done");if(!ct.length)return null;return<div key={cat} style={{marginBottom:16}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[cat]}}/><span style={{fontSize:13,fontWeight:700,color:T.text}}>{cat}</span><div style={{flex:1,height:1,background:T.border}}/><span style={{fontSize:12,color:T.muted}}>{ct.length}</span></div>{sortT(ct).map(t=><Card key={t.id} task={t} onEdit={setEdit} onDel={delTask} onPin={pinTask} T={T}/>)}</div>;})}
              </>}
            </div>}
          </div>}

          {/* LISTS */}
          {view==="lists"&&<div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:isMobile?17:15,fontWeight:700,color:T.text}}>My Lists</span>
              <button onClick={()=>setShowNewList(true)} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:14,fontWeight:600}}>+ New List</button>
            </div>
            {lists.length===0&&<div style={{...C,textAlign:"center",padding:48}}><p style={{fontSize:15,color:T.muted,marginBottom:6}}>No lists yet.</p><p style={{fontSize:13,color:T.muted,marginBottom:18}}>Create a checklist, notes pad, link collection or simple list.</p><button onClick={()=>setShowNewList(true)} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"11px 24px",cursor:"pointer",fontSize:14,fontWeight:600}}>Create your first list</button></div>}
            {lists.map(list=><ListPanel key={list.id} list={list} onUpdate={updateList} onDelete={deleteList} T={T} compact={false}/>)}
          </div>}

          {/* COURSES */}
          {view==="courses"&&<div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:isMobile?17:15,fontWeight:700,color:T.text}}>Semester Tracker</span>
              <span style={{fontSize:12,color:T.muted}}>Week {CURRENT_WEEK} of {WEEKS}</span>
            </div>
            <div style={{...C,marginBottom:16}}>
              <span style={L}>Assignment Deadlines</span>
              {deadlines.length===0&&<p style={{fontSize:13,color:T.muted,marginBottom:12}}>No deadlines added yet.</p>}
              {[...deadlines].sort((a,b)=>a.date>b.date?1:-1).map(d=>{const course=COURSES.find(c=>c.id===d.course),df=dateFmt(d.date);return<div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}><div style={{width:7,height:7,borderRadius:"50%",background:course?.color||T.muted,flexShrink:0}}/><span style={{flex:1,fontSize:14,fontWeight:500,color:T.text}}>{d.title}</span><span style={{fontSize:11,color:course?.color,background:course?.color+"22",padding:"2px 8px",borderRadius:4,fontWeight:600}}>{course?.short}</span><span style={{fontSize:12,color:df?.over?PRIORITY_COLOR.High:PRIORITY_COLOR.Medium,fontWeight:600,minWidth:60,textAlign:"right"}}>{df?.label||d.date}</span><button onClick={()=>delDeadline(d.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:18}}>×</button></div>;})}
              <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:8,marginTop:12}}>
                <input value={newDl.title} onChange={e=>setNewDl(x=>({...x,title:e.target.value}))} placeholder="Assignment name..." style={{...inp2,flex:2}}/>
                <div style={{display:"flex",gap:8}}>
                  <select value={newDl.course} onChange={e=>setNewDl(x=>({...x,course:e.target.value}))} style={{...inp2,flex:1,cursor:"pointer"}}>{COURSES.map(c=><option key={c.id} value={c.id}>{c.short}</option>)}</select>
                  <input type="date" value={newDl.date} onChange={e=>setNewDl(x=>({...x,date:e.target.value}))} style={{...inp2,flex:1}}/>
                  <button onClick={addDeadline} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",cursor:"pointer",fontSize:14,fontWeight:600}}>Add</button>
                </div>
              </div>
            </div>
            {COURSES.map(course=><CourseWeekGrid key={course.id} course={course} weeks={WEEKS} currentWeek={CURRENT_WEEK} get={get} tog={tog} T={T}/>)}
          </div>}

        </div>
      {/* ARCHIVE */}
          {view==="archive"&&<ArchiveView archive={archive} onRestore={restoreTask} onDelete={id=>setArchive(p=>p.filter(x=>x.id!==id))} T={T} isMobile={isMobile}/>}

      </div>

      {edit&&<Modal task={edit} onSave={saveTask} onClose={()=>setEdit(null)} T={T} isMobile={isMobile}/>}
      {showNewList&&<NewListModal onSave={createList} onClose={()=>setShowNewList(false)} T={T} isMobile={isMobile}/>}
      {showSearch&&<SearchModal tasks={tasks} lists={lists} onClose={()=>setShowSearch(false)} T={T} isMobile={isMobile} setView={setView} setEditTask={t=>{setEdit(t);setShowSearch(false);}}/>}
      {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} notifEnabled={notifEnabled} setNotifEnabled={setNotifEnabled} onClose={()=>setShowSettings(false)} T={T} isMobile={isMobile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
